apiVersion: apps/v1
kind: Deployment
metadata:
  name: polling-frontend
  namespace: polling
  labels:
    app: polling-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: polling-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: polling-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/polling-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
