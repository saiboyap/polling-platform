# TEMPLATE — do not commit real secrets.
# In production use External Secrets Operator, Sealed Secrets, or Vault Agent injection.
# Generate values:  echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: polling-backend-secret
  namespace: polling
type: Opaque
data:
  SPRING_DATASOURCE_URL:      <BASE64_OF_jdbc:postgresql://postgres:5432/polling_db>
  SPRING_DATASOURCE_USERNAME: <BASE64_OF_polling_user>
  SPRING_DATASOURCE_PASSWORD: <BASE64_OF_your_db_password>
  JWT_SECRET:                 <BASE64_OF_your_jwt_secret_min_32_chars>
