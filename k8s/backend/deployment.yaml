apiVersion: apps/v1
kind: Deployment
metadata:
  name: polling-backend
  namespace: polling
  labels:
    app: polling-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: polling-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: polling-backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/polling-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: polling-backend-config
            - secretRef:
                name: polling-backend-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Give in-flight requests time to drain before container stops
                command: ["sh", "-c", "sleep 10"]
