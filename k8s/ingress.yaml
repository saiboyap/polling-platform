apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polling-ingress
  namespace: polling
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # SSE and WebSocket need long-lived connections
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: polling.example.com        # replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: polling-backend
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: polling-backend
                port:
                  name: http
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: polling-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polling-frontend
                port:
                  name: http
  # Uncomment for TLS with cert-manager:
  # tls:
  #   - hosts:
  #       - polling.example.com
  #     secretName: polling-tls
