server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

# Set to true (or via KAFKA_ENABLED env var) to enable Kafka producers/consumers.
# When false the app starts without a Kafka broker — all publish calls are silently skipped.
kafka:
  enabled: ${KAFKA_ENABLED:false}

redis:
  enabled: ${REDIS_ENABLED:false}

spring:
  application:
    name: polling-platform

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:polling_db}?sslmode=${PGSSLMODE:disable}
    username: ${PGUSER:polling_user}
    password: ${PGPASSWORD:polling_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        temp:
          use_jdbc_metadata_defaults: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: ${kafka.enabled}   # prevents KafkaAdmin from connecting when Kafka is off
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: polling-platform-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0}
  expiration: ${JWT_EXPIRATION:86400000}

# ── Actuator ───────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true          # exposes /actuator/health/liveness + /readiness for K8s
  health:
    kafka:
      enabled: ${kafka.enabled}
    redis:
      enabled: ${redis.enabled}
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

# ── Resilience4j ───────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      redis:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      kafka-producer:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    instances:
      kafka-producer:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        ignoreExceptions:
          - com.fasterxml.jackson.core.JsonProcessingException

# ── Build / runtime info exposed by /actuator/info ────────────────────
info:
  app:
    name: Polling Platform
    version: 1.0.0
    description: Event-driven real-time polling platform

# ── SpringDoc / Swagger ────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-produces-media-type: application/json

# ── Logging (format overridden by logback-spring.xml per profile) ─────
logging:
  level:
    com.polling: DEBUG
    org.springframework.security: INFO
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
