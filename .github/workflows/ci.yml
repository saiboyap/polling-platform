name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: corretto
          cache: maven

      - name: Compile and package
        working-directory: backend
        run: mvn clean package -DskipTests -B -q

      # Full integration tests require Kafka/Redis/Postgres — run with Testcontainers
      # when you have integration tests written.
      # - name: Run tests
      #   working-directory: backend
      #   run: mvn verify -B

      - name: Verify Docker image builds
        working-directory: backend
        run: docker build -t polling-backend:ci .

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify Docker image builds
        working-directory: frontend
        run: docker build -t polling-frontend:ci .
